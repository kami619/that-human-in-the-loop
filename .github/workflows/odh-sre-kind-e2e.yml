# End-to-end test: spin up a kind cluster with ODH CRDs, CRs, and
# simulated workloads, inject faults, and run the SRE agent.
#
# Requires ANTHROPIC_API_KEY as a repository secret.
# Cost: ~$0.10-0.30 per run (Sonnet orchestrator + Haiku sub-agents).
name: ODH SRE Agent — kind e2e

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "odh-sre-agent/**"
      - ".github/workflows/odh-sre-kind-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: odh-sre-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Install kubernetes-mcp-server
        run: uv pip install kubernetes-mcp-server

      - name: Create kind cluster, install ODH, inject faults
        run: ./scripts/kind-setup.sh

      - name: Show cluster state
        run: |
          kubectl get nodes -o wide
          kubectl get pods -n opendatahub -o wide
          kubectl get datasciencecluster -o wide 2>/dev/null || true
          kubectl get events -n opendatahub --sort-by='.lastTimestamp' | tail -20

      - name: Run SRE agent (live against kind)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run python main.py \
            --query "Check cluster health and investigate all issues in opendatahub namespace" \
            --namespace opendatahub

      - name: Teardown kind cluster
        if: always()
        run: ./scripts/kind-teardown.sh
